<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Bloom</title>

    <link rel="stylesheet" href="css/style.css">

    <!-- GSAP -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>

    <!-- Howler -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/howler/2.2.4/howler.min.js"></script>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>

<body>

    <!-- Parallax Background -->

    <div id="bg-parallax">
        <div class="parallax-layer layer-stars" id="layer-stars"></div>
        <div class="parallax-layer layer-float" id="layer-float"></div>
        <div class="parallax-layer layer-fast" id="layer-fast"></div>
    </div>

    <div id="background-glow"></div>

    <div id="particles"></div>

    <!-- Intro -->

    <section id="intro">

        <h1>
            Some feelings bloom<br>
            no matter the distance.
        </h1>

        <p>
            Choose a flower
        </p>

    </section>

    <!-- Flowers -->

    <section id="garden">

        <!-- Peony -->

        <div class="flower-container">

            <div class="flower-wrapper" data-flower="peony">

                <div class="flower-glow"></div>

                <img
                    class="flower"
                    src="assets/flowers/peony.png"
                    alt="Peony"
                >

                <div class="flower-particles"></div>

            </div>

        </div>

        <!-- Spider Lily -->

        <div class="flower-container">

            <div class="flower-wrapper center-wrapper" data-flower="spiderLily">

                <div class="flower-glow"></div>

                <img
                    class="flower center-flower"
                    src="assets/flowers/spider-lily.png"
                    alt="Spider Lily"
                >

                <div class="flower-particles"></div>

            </div>

        </div>

        <!-- Morning Glory -->

        <div class="flower-container">

            <div class="flower-wrapper" data-flower="morningGlory">

                <div class="flower-glow"></div>

                <img
                    class="flower"
                    src="assets/flowers/morning-glory.png"
                    alt="Morning Glory"
                >

                <div class="flower-particles"></div>

            </div>

        </div>

    </section>

    <!-- Gathering Particles (message formation) -->

    <div id="gatheringField"></div>

    <!-- Message Modal -->

    <div id="messageOverlay">

        <div id="messageCard">

            <div class="letter-glow"></div>

            <div id="cardTop">

                <img
                    id="albumCover"
                    src=""
                    alt=""
                >

                <div id="songInfo">

                    <h3 id="songTitle">
                        Song Title
                    </h3>

                    <p id="artistName">
                        Artist
                    </p>

                </div>

            </div>

            <div id="lyricsPanel">

                <div id="lyricsViewport">

                    <div id="messageContent"></div>

                </div>

            </div>

            <div id="player">

                <button id="playPause">
                    ⏸
                </button>

            </div>

            <button id="closeBtn">
                Choose Another Flower
            </button>

        </div>

    </div>

    <!-- Secret Ending -->

    <div id="endingOverlay"></div>

    <div id="giantFlower">
        <img src="assets/flowers/spider-lily.png" alt="">
    </div>

    <!-- Favorite Flower Quiz -->

    <div id="favoriteQuiz">

        <h2 id="quizQuestion">
            Which is Yukie's favorite flower?
        </h2>

        <div id="quizOptions">

            <button class="quiz-flower" type="button" data-answer="peony">
                <img src="assets/flowers/peony.png" alt="Peony">
            </button>

            <button class="quiz-flower" type="button" data-answer="spiderLily">
                <img src="assets/flowers/spider-lily.png" alt="Spider Lily">
            </button>

            <button class="quiz-flower" type="button" data-answer="morningGlory">
                <img src="assets/flowers/morning-glory.png" alt="Morning Glory">
            </button>

        </div>

        <p id="quizError"></p>

    </div>

    <div id="endingScreen">

        <h2 id="endingTitle"></h2>

        <p id="endingBody"></p>

    </div>

    <!-- Scripts -->

    <script src="js/messages.js"></script>
    <script src="js/music.js"></script>
    <script src="js/script.js"></script>

</body>
</html>
